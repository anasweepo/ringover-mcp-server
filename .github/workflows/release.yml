name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish MCPB bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install bundled server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag (v$TAG_VERSION). Bump 'version' in manifest.json before tagging."
            exit 1
          fi
          echo "Version $MANIFEST_VERSION matches tag v$TAG_VERSION"

      - name: Validate manifest
        run: npx -y @anthropic-ai/mcpb validate manifest.json

      - name: Smoke-test server startup
        working-directory: server
        env:
          RINGOVER_API_KEY: "ci-dummy-token"
        run: |
          node index.js &
          PID=$!
          sleep 2
          if ! kill -0 $PID 2>/dev/null; then
            echo "::error::Server crashed on startup"
            exit 1
          fi
          kill $PID
          echo "Server starts correctly"

      - name: Build MCPB bundle
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          npx -y @anthropic-ai/mcpb pack . "ringover-mcp-v${TAG_VERSION}.mcpb"
          ls -lh *.mcpb

      - name: Compute SHA-256
        id: hash
        run: |
          SHA=$(sha256sum *.mcpb | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.mcpb"
          body: |
            ## Installation

            1. Télécharger `ringover-mcp-v${{ github.ref_name }}.mcpb` ci-dessous.
            2. Double-cliquer le fichier, ou dans Claude Desktop : **Settings → Extensions → Install from file…**
            3. Coller votre **Ringover API Key** (Dashboard Ringover › Développeurs › API).
            4. Cliquer **Install**.

            Aucun Node, `npx` ou édition manuelle de config n'est requis côté utilisateur.

            **SHA-256** : `${{ steps.hash.outputs.sha256 }}`
